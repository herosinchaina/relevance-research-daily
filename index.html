<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Query-物料相关性论文库 · Query–Material Relevance</title>
<style>
  :root { color-scheme: light; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f4f6fb;
    color: #1e2430;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1140px; margin: 0 auto; padding: 48px 28px 100px; }

  header.top { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; border-bottom: 3px solid #1e2430; padding-bottom: 20px; }
  header.top h1 { font-size: 34px; font-weight: 800; letter-spacing: -.5px; }
  header.top .en { font-size: 13px; color: #7a8499; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
  .datebox { text-align: right; }
  .datepick { font-size:13px; color:#5a6478; font-weight:600; display:inline-flex; align-items:center; gap:8px; }
  .datepick select { font-size:15px; font-weight:700; color:#1e2430; border:2px solid #d8def0; border-radius:10px; padding:6px 12px; background:#fff; cursor:pointer; font-family:inherit; }
  .datepick select:hover { border-color:#2f6df6; }
  .datebox .c { display:block; margin-top:8px; background:#2f6df6; color:#fff; font-size:13px; font-weight:600; padding:4px 12px; border-radius:100px; }

  .filters { display: flex; flex-wrap: wrap; gap: 10px; margin: 26px 0 8px; }

  /* 搜索栏 */
  .searchbar { position:relative; margin:26px 0 6px; }
  .searchbar input { width:100%; font-size:15px; padding:13px 44px 13px 18px; border:2px solid #d8def0; border-radius:12px; background:#fff; font-family:inherit; color:#1e2430; outline:none; transition:.15s; }
  .searchbar input:focus { border-color:#2f6df6; box-shadow:0 0 0 4px rgba(47,109,246,.1); }
  .searchbar #searchClear { position:absolute; right:8px; top:50%; transform:translateY(-50%); width:30px; height:30px; border:none; background:#eef1f7; color:#5a6478; font-size:18px; border-radius:50%; cursor:pointer; display:none; }
  .searchbar #searchClear.show { display:block; }
  .searchbar #searchClear:hover { background:#dde3f0; }

  /* 搜索结果 */
  .search-head { margin:18px 0 16px; font-size:15px; color:#5a6478; }
  .search-head b { color:#2f6df6; }
  .search-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap:20px; }
  .res-card { background:#fff; border-radius:16px; padding:22px; box-shadow:0 2px 14px rgba(30,40,60,.06); border-top:4px solid var(--c); transition:.2s; display:flex; flex-direction:column; }
  .res-card:hover { transform:translateY(-4px); box-shadow:0 10px 30px rgba(30,40,60,.12); }
  .res-card .meta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  .res-card .tag { font-size:12px; font-weight:700; color:#fff; background:var(--c); padding:3px 10px; border-radius:6px; }
  .res-card .date { font-size:12px; font-weight:700; color:#5a6478; background:#eef1f7; padding:3px 10px; border-radius:6px; }
  .res-card h3 { font-size:17px; font-weight:700; line-height:1.4; margin-bottom:8px; }
  .res-card .src { font-size:12.5px; color:#8a93a6; margin-bottom:10px; }
  .res-card p { font-size:13.5px; color:#444c5c; margin-bottom:12px; }
  .res-card mark { background:#fff2a8; color:inherit; padding:0 1px; border-radius:2px; }
  .res-card .actions { display:flex; gap:14px; align-items:center; margin-top:auto; flex-wrap:wrap; }
  .res-card .btn-detail { font-size:13px; font-weight:700; color:#fff; background:var(--c); border:none; border-radius:8px; padding:7px 14px; cursor:pointer; }
  .res-card .btn-detail:hover { filter:brightness(.92); }
  .res-card .link { font-size:13px; font-weight:600; color:var(--c); text-decoration:none; }
  .res-card .link:hover { text-decoration:underline; }
  .res-card .goto { font-size:12.5px; color:#8a93a6; cursor:pointer; }
  .res-card .goto:hover { color:var(--c); text-decoration:underline; }
  .chip { font-size: 13.5px; font-weight: 600; padding: 8px 18px; border-radius: 100px; cursor: pointer; border: 2px solid transparent; background: #fff; color: #5a6478; transition: .18s; }
  .chip:hover { transform: translateY(-1px); }
  .chip .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:7px; vertical-align: middle; background: var(--c); }
  .chip.active { color:#fff; background: var(--c); border-color: var(--c); }
  .chip.active .dot { background:#fff; }

  .section-intro { margin: 30px 0 22px; padding: 18px 22px; background:#fff; border-left: 5px solid var(--c); border-radius: 12px; box-shadow: 0 2px 14px rgba(30,40,60,.05); }
  .section-intro h2 { font-size: 22px; font-weight: 800; }
  .section-intro h2 .en { font-size: 13px; color:#9aa3b5; font-weight:600; margin-left:10px; letter-spacing:1px; }
  .section-intro p { font-size: 14.5px; color:#5a6478; margin-top: 6px; }
  .section-intro .n { font-size:13px; color: var(--c); font-weight:700; margin-top:8px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 20px; }
  .card { background:#fff; border-radius:16px; padding:22px; box-shadow: 0 2px 14px rgba(30,40,60,.06); border-top: 4px solid var(--c); transition:.2s; display:flex; flex-direction:column; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(30,40,60,.12); }
  .card .tag { display:inline-block; align-self:flex-start; font-size:12px; font-weight:700; color:#fff; background: var(--c); padding:3px 10px; border-radius:6px; margin-bottom:12px; }
  .card h3 { font-size:18px; font-weight:700; line-height:1.4; margin-bottom:8px; }
  .card .src { font-size:12.5px; color:#8a93a6; margin-bottom:12px; }
  .card p { font-size:14px; color:#444c5c; margin-bottom:14px; }
  .card .pts { font-size:13px; color:#2c3340; background:#f4f6fb; border-radius:10px; padding:11px 14px; margin-top:auto; }
  .card .pts b { color: var(--c); }
  .card .link { display:inline-block; margin-top:14px; font-size:13px; font-weight:600; color: var(--c); text-decoration:none; }
  .card .link:hover { text-decoration:underline; }
  .card .actions { display:flex; gap:16px; align-items:center; margin-top:14px; flex-wrap:wrap; }
  .card .actions .link { margin-top:0; }
  .card .btn-detail { font-size:13px; font-weight:700; color:#fff; background:var(--c); border:none; border-radius:8px; padding:7px 14px; cursor:pointer; transition:.15s; }
  .card .btn-detail:hover { filter:brightness(.92); }

  /* 当日综述区块 */
  .digest { margin: 4px 0 26px; padding: 20px 24px; background: linear-gradient(135deg,#fff, #fbfcff); border:1px solid #e7ebf5; border-radius:14px; box-shadow:0 2px 14px rgba(30,40,60,.05); }
  .digest .dh { display:flex; align-items:center; gap:10px; font-size:15px; font-weight:800; color:var(--c); margin-bottom:10px; }
  .digest .dh::before { content:'今日综述'; font-size:11px; font-weight:700; color:#fff; background:var(--c); padding:3px 9px; border-radius:6px; letter-spacing:1px; }
  .digest .dbody { font-size:14.5px; color:#3a4252; line-height:1.9; }
  .digest .dbody p { margin-bottom:11px; }
  .digest .dbody p:last-child { margin-bottom:0; }
  .digest .dbody b { color:var(--c); font-weight:700; }
  .digest .dbody .paper-ref { color:var(--c); font-weight:700; cursor:pointer; border-bottom:1.5px dashed var(--c); padding-bottom:1px; transition:.15s; }
  .digest .dbody .paper-ref:hover { background:var(--c); color:#fff; border-radius:4px; padding:1px 4px; border-bottom-color:transparent; }
  @keyframes cardFlash { 0%{ box-shadow:0 0 0 0 var(--c);} 30%{ box-shadow:0 0 0 5px var(--c);} 100%{ box-shadow:0 2px 14px rgba(30,40,60,.06);} }
  .card.flash { animation: cardFlash 1.1s ease; }

  /* 详解弹窗 */
  .modal-mask { position:fixed; inset:0; background:rgba(20,26,40,.55); display:none; align-items:flex-start; justify-content:center; padding:40px 16px; z-index:50; overflow-y:auto; }
  .modal-mask.show { display:flex; }
  .modal { background:#fff; max-width:760px; width:100%; border-radius:18px; padding:32px 34px 38px; box-shadow:0 20px 60px rgba(20,26,40,.3); border-top:6px solid var(--c); animation:pop .18s ease; }
  @keyframes pop { from{transform:translateY(12px);opacity:0;} to{transform:none;opacity:1;} }
  .modal .mtag { display:inline-block; font-size:12px; font-weight:700; color:#fff; background:var(--c); padding:3px 11px; border-radius:6px; }
  .modal h2 { font-size:23px; font-weight:800; line-height:1.4; margin:12px 0 8px; }
  .modal .msrc { font-size:13px; color:#8a93a6; margin-bottom:20px; }
  .modal .mexplain { font-size:15.5px; color:#2c3340; line-height:2; }
  .modal .mexplain p { margin-bottom:14px; }
  .modal .mexplain p:last-child { margin-bottom:0; }
  .modal .mexplain b { color:var(--c); font-weight:700; }
  .modal .mfoot { margin-top:24px; padding-top:18px; border-top:1px solid #eef1f7; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
  .modal .mfoot a { font-size:14px; font-weight:700; color:var(--c); text-decoration:none; }
  .modal .mclose { position:fixed; top:24px; right:28px; width:40px; height:40px; border-radius:50%; border:none; background:#fff; color:#1e2430; font-size:22px; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.15); z-index:51; }
  body.modal-open { overflow:hidden; }

  footer { text-align:center; margin-top:64px; color:#9aa3b5; font-size:13px; line-height:1.9; }
  .empty { text-align:center; color:#9aa3b5; padding:60px 0; font-size:15px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1 id="siteTitle">相关性论文日报</h1>
      <div class="en" id="siteSub">Relevance Research Daily</div>
    </div>
    <div class="datebox">
      <label class="datepick">📅 选择日期
        <select id="daySelect"></select>
      </label>
      <div class="c" id="countText">—</div>
    </div>
  </header>

  <div class="searchbar">
    <input id="searchInput" type="search" placeholder="🔍 搜索全部论文（标题 / 机构 / 出处 / 总结 / 详解…，支持模糊与多关键词）" autocomplete="off">
    <button id="searchClear" title="清除">×</button>
  </div>

  <nav class="filters" id="filters"></nav>
  <div id="intro"></div>
  <div id="digest"></div>
  <div id="searchResults"></div>
  <div class="grid" id="grid"></div>

  <footer>
    每日精读 · 按日期归档，用右上角选择器查看历史<br>
    <span id="updated"></span>
  </footer>
</div>

<!-- 详解弹窗 -->
<div class="modal-mask" id="modalMask">
  <button class="mclose" id="modalClose" aria-label="关闭">×</button>
  <div class="modal" id="modalBox"></div>
</div>

<script>
const COLORS = {};
let DATA = null;       // 整个数据集：{title, subtitle, latest, categories, index, days}
let DAY = null;        // 当前选中那天的数据：{date, digests, papers}
let current = null;    // 当前选中的板块 id
let currentDate = null;// 当前选中的日期

function esc(s){ return String(s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// 切换到某一天
function selectDay(date){
  currentDate = date;
  DAY = DATA.days[date];
  render();
}

function render(){
  // 退出搜索态：隐藏搜索结果，显示常规的板块/综述/卡片
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('intro').style.display = '';
  document.getElementById('digest').style.display = '';
  document.getElementById('grid').style.display = '';
  document.getElementById('filters').style.display = '';

  const cats = DATA.categories;
  document.getElementById('siteTitle').textContent = DATA.title;
  document.getElementById('siteSub').textContent = DATA.subtitle;
  document.getElementById('updated').textContent =
    '当前查看：' + currentDate + ' · 共收录 ' + DATA.index.length + ' 天';

  // build filters
  const fbox = document.getElementById('filters');
  fbox.innerHTML = '';
  cats.forEach(cat => {
    COLORS[cat.id] = cat.color;
    const b = document.createElement('button');
    b.className = 'chip' + (cat.id===current ? ' active':'');
    b.style.setProperty('--c', cat.color);
    b.innerHTML = '<span class="dot"></span>' + esc(cat.name);
    b.onclick = ()=>{ current = cat.id; render(); window.scrollTo({top:0,behavior:'smooth'}); };
    fbox.appendChild(b);
  });

  const cat = cats.find(c=>c.id===current);
  const papers = DAY.papers.filter(p=>p.category===current);

  // section intro
  const intro = document.getElementById('intro');
  intro.innerHTML = '';
  if(cat){
    const div = document.createElement('div');
    div.className = 'section-intro';
    div.style.setProperty('--c', cat.color);
    div.innerHTML = '<h2>'+esc(cat.name)+'<span class="en">'+esc(cat.en)+'</span></h2>'
      + '<p>'+esc(cat.desc)+'</p>'
      + '<div class="n">本类别 '+currentDate+' 收录 '+papers.length+' 篇</div>';
    intro.appendChild(div);
  }
  document.getElementById('countText').textContent = '本类别 ' + papers.length + ' 篇';

  // 当日综述（放在卡片列表最前面）
  const digestBox = document.getElementById('digest');
  digestBox.innerHTML = '';
  const dtext = DAY.digests && DAY.digests[current];
  if(dtext){
    const dd = document.createElement('div');
    dd.className = 'digest';
    dd.style.setProperty('--c', cat.color);
    // 综述按空行分段；先转义，再把【小标题】加粗、把 [[id|名]] / [[date:id|名]] 变成可点击链接
    const body = dtext.split('\n\n').map(para => {
      let h = esc(para).replace(/【([^】]+)】/g, '<b>【$1】</b>');
      h = h.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, (m, ref, label)=>{
        // ref 形如 "drmm"（当天）或 "2025-06-27:drmm"（历史某天）
        let date = currentDate, id = ref;
        if(ref.indexOf(':') >= 0){ const parts = ref.split(':'); date = parts[0]; id = parts[1]; }
        return '<a class="paper-ref" data-date="'+esc(date)+'" data-id="'+esc(id)+'">'+label+'</a>';
      });
      return '<p>' + h + '</p>';
    }).join('');
    dd.innerHTML = '<div class="dh">'+esc(cat.name)+' · '+currentDate+'</div>'
      + '<div class="dbody">'+body+'</div>';
    digestBox.appendChild(dd);
    // 给综述里的论文引用绑定点击跳转
    dd.querySelectorAll('.paper-ref').forEach(a=>{
      a.onclick = ()=> jumpToPaper(a.getAttribute('data-date'), a.getAttribute('data-id'));
    });
  }

  // cards
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if(papers.length===0){
    grid.innerHTML = '<div class="empty">该类别这天暂无论文</div>';
    return;
  }
  papers.forEach((p, idx)=>{
    const c = document.createElement('div');
    c.className = 'card';
    if(p.id){ c.id = 'paper-' + p.id; }
    c.style.setProperty('--c', COLORS[p.category]);
    const detailBtn = p.explain ? '<button class="btn-detail">📖 小白详解</button>' : '';
    const link = p.url ? '<a class="link" href="'+esc(p.url)+'" target="_blank" rel="noopener">阅读原文 ↗</a>' : '';
    c.innerHTML =
      '<span class="tag">'+esc(cat.name)+'</span>'
      + '<h3>'+esc(p.title)+'</h3>'
      + '<div class="src">'+esc(p.source)+' · '+esc(p.venue)+(p.tag?' · '+esc(p.tag):'')+'</div>'
      + '<p>'+esc(p.summary)+'</p>'
      + '<div class="pts"><b>核心贡献：</b>'+esc(p.contrib)+'</div>'
      + '<div class="actions">'+detailBtn+link+'</div>';
    const btn = c.querySelector('.btn-detail');
    if(btn){ btn.onclick = ()=>openModal(p, cat); }
    grid.appendChild(c);
  });
}

// 跳转到某天某篇论文的卡片：先确保日期和板块正确，再滚动+高亮
function jumpToPaper(date, id){
  // 1) 若不是当前日期，先切到那天
  if(date && date !== currentDate && DATA.days[date]){
    document.getElementById('daySelect').value = date;
    selectDay(date);
  }
  // 2) 找到这篇论文属于哪个板块，切过去
  const target = (DAY.papers || []).find(p => p.id === id);
  if(target && target.category !== current){
    current = target.category;
    render();
  }
  // 3) 滚动到卡片并高亮（render 是同步的，元素此时已在 DOM 里）
  const el = document.getElementById('paper-' + id);
  if(el){
    el.scrollIntoView({behavior:'smooth', block:'center'});
    el.classList.remove('flash');
    void el.offsetWidth; // 触发重绘，使动画可重复
    el.classList.add('flash');
  }
}

// ===== 全库模糊搜索 =====
// 把所有日期、所有类别的论文拉平成一个列表（带上 date）
function allPapers(){
  const out = [];
  Object.keys(DATA.days).forEach(date=>{
    (DATA.days[date].papers || []).forEach(p=> out.push(Object.assign({__date:date}, p)));
  });
  return out;
}
function catName(id){ const c = DATA.categories.find(x=>x.id===id); return c ? c.name : id; }
function catColor(id){ const c = DATA.categories.find(x=>x.id===id); return c ? c.color : '#2f6df6'; }

// 高亮命中的关键词
function highlight(text, terms){
  let h = esc(text);
  terms.forEach(t=>{
    if(!t) return;
    const re = new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')', 'gi');
    h = h.replace(re, '<mark>$1</mark>');
  });
  return h;
}

function runSearch(q){
  const clearBtn = document.getElementById('searchClear');
  q = (q||'').trim();
  clearBtn.classList.toggle('show', q.length>0);

  // 空查询：恢复正常视图
  if(!q){ render(); return; }

  // 多关键词：空格分词，全部命中（AND）才算匹配；大小写不敏感
  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  const fields = p => [p.title, p.source, p.venue, p.tag, p.summary, p.contrib, p.explain]
                        .filter(Boolean).join(' ').toLowerCase();
  const hits = allPapers().filter(p => {
    const blob = fields(p);
    return terms.every(t => blob.includes(t));
  });
  // 按日期倒序、同日按类别
  hits.sort((a,b)=> a.__date<b.__date?1:(a.__date>b.__date?-1:0));

  // 进入搜索态：隐藏常规视图，显示结果
  document.getElementById('filters').style.display = 'none';
  document.getElementById('intro').style.display = 'none';
  document.getElementById('digest').style.display = 'none';
  document.getElementById('grid').style.display = 'none';
  document.getElementById('countText').textContent = '搜索结果 ' + hits.length + ' 篇';

  const box = document.getElementById('searchResults');
  if(hits.length===0){
    box.innerHTML = '<div class="search-head">没有找到包含 “<b>'+esc(q)+'</b>” 的论文。换个关键词试试？</div>';
    return;
  }
  let html = '<div class="search-head">在全部 '+DATA.index.length+' 天的数据中，找到 <b>'+hits.length+'</b> 篇匹配 “'+esc(q)+'” 的论文：</div>';
  html += '<div class="search-grid">';
  hits.forEach((p,i)=>{
    const color = catColor(p.category);
    const detail = p.explain ? '<button class="btn-detail" data-i="'+i+'">📖 小白详解</button>' : '';
    const link = p.url ? '<a class="link" href="'+esc(p.url)+'" target="_blank" rel="noopener">阅读原文 ↗</a>' : '';
    html += '<div class="res-card" style="--c:'+color+'">'
      + '<div class="meta"><span class="tag">'+esc(catName(p.category))+'</span><span class="date">'+p.__date+'</span></div>'
      + '<h3>'+highlight(p.title, terms)+'</h3>'
      + '<div class="src">'+highlight(p.source+' · '+p.venue+(p.tag?' · '+p.tag:''), terms)+'</div>'
      + '<p>'+highlight(p.summary, terms)+'</p>'
      + '<div class="actions">'+detail+link
      + '<span class="goto" data-i="'+i+'">在 '+p.__date+' 中查看 →</span></div>'
      + '</div>';
  });
  html += '</div>';
  box.innerHTML = html;

  // 绑定结果卡片上的按钮
  box.querySelectorAll('.btn-detail').forEach(btn=>{
    btn.onclick = ()=>{ const p = hits[+btn.getAttribute('data-i')]; openModal(p, DATA.categories.find(c=>c.id===p.category)); };
  });
  box.querySelectorAll('.goto').forEach(g=>{
    g.onclick = ()=>{ const p = hits[+g.getAttribute('data-i')];
      document.getElementById('searchInput').value = '';
      jumpToPaper(p.__date, p.id);
    };
  });
}

// ===== 详解弹窗 =====
function openModal(p, cat){
  const box = document.getElementById('modalBox');
  box.style.setProperty('--c', cat.color);
  const link = p.url ? '<a href="'+esc(p.url)+'" target="_blank" rel="noopener">阅读原文 ↗</a>' : '<span></span>';
  const explainHtml = (p.explain || '暂无详解').split('\n\n').map(para =>
    '<p>' + esc(para).replace(/【([^】]+)】/g, '<b>【$1】</b>') + '</p>'
  ).join('');
  box.innerHTML =
    '<span class="mtag">'+esc(cat.name)+'</span>'
    + '<h2>'+esc(p.title)+'</h2>'
    + '<div class="msrc">'+esc(p.source)+' · '+esc(p.venue)+(p.tag?' · '+esc(p.tag):'')+'</div>'
    + '<div class="mexplain">'+explainHtml+'</div>'
    + '<div class="mfoot">'+link+'<span style="font-size:12px;color:#aab;">按 Esc 或点空白处关闭</span></div>';
  document.getElementById('modalMask').classList.add('show');
  document.body.classList.add('modal-open');
}
function closeModal(){
  document.getElementById('modalMask').classList.remove('show');
  document.body.classList.remove('modal-open');
}

// 初始化：填充日期下拉、默认显示最新一天
function boot(data){
  DATA = data;
  current = DATA.categories[0].id;

  // 填充日期选择器（index 已按日期倒序）
  const sel = document.getElementById('daySelect');
  sel.innerHTML = '';
  DATA.index.forEach(d => {
    const o = document.createElement('option');
    o.value = d.date;
    o.textContent = d.date + '（' + d.count + ' 篇）';
    sel.appendChild(o);
  });
  sel.onchange = ()=>{ selectDay(sel.value); window.scrollTo({top:0,behavior:'smooth'}); };

  // 默认最新一天
  sel.value = DATA.latest;
  selectDay(DATA.latest);
}

// 加载策略：
// 1) 本地服务器(http/https) → fetch 读取 data/index.json + categories.json + 按需的每天文件
// 2) 双击(file://) → fetch 被浏览器拦截，直接用内嵌的 PAPERS_DATA（含全部天）
function loadFromFetch(){
  Promise.all([
    fetch('data/index.json').then(r=>{ if(!r.ok) throw 0; return r.json(); }),
    fetch('data/categories.json').then(r=>{ if(!r.ok) throw 0; return r.json(); })
  ]).then(([index, catWrap])=>{
    // 拉取所有天的数据（天数不多，一次性取齐，切换更顺滑）
    return Promise.all(index.days.map(d =>
      fetch('data/days/'+d.date+'.json').then(r=>{ if(!r.ok) throw 0; return r.json(); })
    )).then(dayArr=>{
      const days = {};
      dayArr.forEach(dj => { days[dj.date] = dj; });
      boot({
        title: index.title,
        subtitle: index.subtitle,
        latest: index.latest,
        categories: catWrap.categories,
        index: index.days,
        days: days
      });
    });
  }).catch(useInline);
}
function useInline(){
  if(window.PAPERS_DATA){ boot(window.PAPERS_DATA); }
  else {
    document.getElementById('grid').innerHTML =
      '<div class="empty">无法加载数据。请用本地服务器打开（见 README），或运行 build.py 生成内嵌数据。</div>';
  }
}
// file:// 下 fetch 不可靠，直接走内嵌数据；否则尝试 fetch，失败再回退内嵌。
// 注意：内嵌数据脚本 papers.inline.js 在本脚本之后加载，
// 因此必须等到 DOM 解析完（DOMContentLoaded）再读取 window.PAPERS_DATA。
function start(){
  // 弹窗关闭事件
  document.getElementById('modalClose').onclick = closeModal;
  document.getElementById('modalMask').addEventListener('click', e=>{
    if(e.target === document.getElementById('modalMask')) closeModal();
  });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

  // 搜索事件（输入即搜，带轻微防抖）
  const si = document.getElementById('searchInput');
  let t = null;
  si.addEventListener('input', ()=>{ clearTimeout(t); t = setTimeout(()=>runSearch(si.value), 120); });
  document.getElementById('searchClear').onclick = ()=>{ si.value=''; runSearch(''); si.focus(); };

  if(location.protocol === 'file:'){
    useInline();
  } else {
    try { loadFromFetch(); } catch(e) { useInline(); }
  }
}
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', start);
} else {
  start();
}
</script>
<!-- 内嵌数据：双击直接打开时使用。由 build.py 自动从 data/papers.json 生成，请勿手改。 -->
<script src="data/papers.inline.js"></script>
